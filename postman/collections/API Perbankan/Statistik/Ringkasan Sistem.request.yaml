$kind: http-request
name: Ringkasan Sistem
method: GET
url: '{{base_url}}/api/statistik/ringkasan'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{api_token}}'
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.be.json;
      });

      pm.test("Response has summary data", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property("data");
          pm.expect(jsonData.data).to.be.an("object");
      });

      pm.test("Summary has statistical fields", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.data).to.have.any.keys(
              "total_entitas", "total_rekening", "total_transaksi", "total_saldo"
          );
      });

      pm.test("Response time is less than 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });
